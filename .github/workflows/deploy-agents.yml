name: Deploy Agents

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "web/**"

env:
  PROJECT_ID: ancol-mom-compliance-dev
  REGION: asia-southeast2
  REGISTRY: asia-southeast2-docker.pkg.dev

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^services/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          if git diff --name-only HEAD~1 HEAD | grep -q '^packages/'; then
            CHANGED='["api-gateway","extraction-agent","legal-research-agent","comparison-agent","reporting-agent","document-processor","batch-engine","email-ingest","regulation-monitor"]'
          fi
          echo "services=$CHANGED" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    env:
      SERVICE_NAME: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud builds submit \
            --tag "$REGISTRY/$PROJECT_ID/ancol/$SERVICE_NAME:$COMMIT_SHA" \
            "services/$SERVICE_NAME"

      - name: Deploy to Cloud Run
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud run deploy "ancol-$SERVICE_NAME" \
            --image "$REGISTRY/$PROJECT_ID/ancol/$SERVICE_NAME:$COMMIT_SHA" \
            --region "$REGION" \
            --service-account "ancol-${SERVICE_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" \
            --quiet

  deploy-web:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      contains(toJson(github.event.commits.*.modified), 'web/') ||
      contains(toJson(github.event.commits.*.added), 'web/')
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push web image
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud builds submit \
            --tag "$REGISTRY/$PROJECT_ID/ancol/web-frontend:$COMMIT_SHA" \
            "web"

      - name: Deploy web frontend to Cloud Run
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud run deploy "ancol-web-frontend" \
            --image "$REGISTRY/$PROJECT_ID/ancol/web-frontend:$COMMIT_SHA" \
            --region "$REGION" \
            --port 3000 \
            --service-account "ancol-web-frontend@${PROJECT_ID}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --quiet
