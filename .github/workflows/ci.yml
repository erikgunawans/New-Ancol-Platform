name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/ services/ scripts/ corpus/scripts/
      - run: ruff format --check packages/ services/ scripts/ corpus/scripts/

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd web && npm ci && npm run lint

  test-python:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e "packages/ancol-common[test]"
          pip install pytest pytest-asyncio httpx
      - name: Run tests per service
        run: |
          FAILED=0
          for svc in extraction-agent legal-research-agent comparison-agent reporting-agent api-gateway batch-engine email-ingest regulation-monitor gemini-agent; do
            echo "=== Testing $svc ==="
            PYTHONPATH=packages/ancol-common/src:services/$svc/src \
              python3 -m pytest services/$svc/tests/ -q --tb=short || FAILED=1
          done
          exit $FAILED

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - name: Validate all modules
        run: |
          for module in infra/modules/*/; do
            echo "Validating $module..."
            cd "$module"
            terraform init -backend=false 2>/dev/null
            terraform validate
            cd -
          done
